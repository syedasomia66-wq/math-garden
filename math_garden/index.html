<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Math Garden</title>

  <!-- Styles -->
  <link rel="stylesheet" href="css/styles.css">

  <!-- Google Font -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Just+Another+Hand&display=swap">

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">

  <!-- Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>

  <!-- Latest OpenCV.js -->
  <script async src="https://docs.opencv.org/4.x/opencv.js" onload="onOpenCvReady()"></script>

  <!-- Custom Scripts -->
  <script src="drawing.js"></script>
  <script src="processing.js"></script>
  <script src="maths.js"></script>
</head>

<body>
  <div class="container">
    <!-- Title -->
    <h1 id="title">Math Garden</h1>

    <!-- Math Question -->
    <h2 id="question">
      <span id="n1">3</span> + <span id="n2">2</span> =
    </h2>

    <!-- Drawing Canvas -->
    <canvas id="my-canvas" width="150" height="150"></canvas>
  </div>

  <div class="container">
    <button id="checkAnswer" class="btn">Check Answer</button>
  </div>

  <script>
    // OpenCV.js ready callback
    function onOpenCvReady() {
      console.log("OpenCV.js is ready ✅");

      // Initialize app AFTER OpenCV is loaded
      loadModel();
      prepareCanvas();
      nextQuestion();

      // Button logic
      document.getElementById("checkAnswer").addEventListener("click", () => {
        checkAnswer();
        clearCanvas();
        nextQuestion();
      });
    }
  </script>
</body>
</html>
